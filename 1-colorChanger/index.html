<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Scheme Switcher</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="backgroundSwitch.js"></script>
</head>
<body>
    <main>
        <h1>Color Scheme Switcher</h1>
        <div class="buttonDiv">
            <div class="button red" id="red"></div>
            <div class="button blue" id="blue"></div>
            <div class="button green" id="green"></div>
            <div class="button yellow" id="yellow"></div>
        </div>
        <p>Try clicking on one of the colors above
to change the background color of this page!</p>
        </main>
    
</body>
</html>
